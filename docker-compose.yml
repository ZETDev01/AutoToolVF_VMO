services:
  vinmotion:
    build: .
    ports:
      - "${VINFAST_WEB_PUBLISHED_PORT:-8080}:8080"
      - "${VINFAST_ROBOT_PUBLISHED_PORT:-9000}:9000"
    environment:
      VINFAST_WEB_HOST: 0.0.0.0
      VINFAST_WEB_PORT: 8080
      VINFAST_ROBOT_HOST: 0.0.0.0
      VINFAST_ROBOT_PORT: 9000
      VINFAST_REALTIME_MODALITIES: text
    volumes:
      - ./logs:/app/logs
      - ./runs:/app/runs
    restart: unless-stopped
